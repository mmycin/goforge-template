version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/database/migrations"          # ← directory of Atlas .sql migrations (sqlc applies them in order)
    queries: "internal/database/queries"            # ← adjust if single file: "internal/database/queries/todo.sql"
    gen:
      go:
        package: "dbqueries"                        # ← more descriptive; avoids clash with your 'database' pkg
        out: "internal/database/generated"          # ← generated files go here
        emit_json_tags: true                        # useful if you return structs as JSON sometimes
        emit_interface: true                        # generates Queries interface (good for mocking/tests)
        emit_exact_table_names: true                # keeps table names as-is (no pluralization surprises)
        emit_empty_slices: true                     # [] instead of nil for empty results
        overrides: []                               # add if needed, e.g. custom types
        omit_unused_structs: true                 # optional: skips unused table structs (cleaner if many tables)